app = "your-fly-app-name"
primary_region = "sin"

[build]
dockerfile = "Dockerfile"

[env]
SPRING_PROFILES_ACTIVE = "prod"

[http_service]
internal_port = 8080
force_https = true
auto_start_machines = true
auto_stop_machines = "stop"
min_machines_running = 0
processes = ["app"]

[[http_service.checks]]
interval = "15s"
timeout = "5s"
grace_period = "30s"
method = "GET"
path = "/actuator/health"

[[vm]]
cpu_kind = "shared"
cpus = 1
memory_mb = 512