spring:
  server:
    port: ${PORT:8081}
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  port: ${PORT:8081}

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  RabbitMQ:
    uri: ${RABBITMQ_URI}

app:
  base-url: http://localhost:${PORT:8081}

rabbit:
  exchange: orchestrate.exchange
  queue: orchestrate.queue
  routing-key: orchestrate.routingkey

jwt:
  secret: ${JWT_SECRET:mysecretkey}
  expiration: ${JWT_EXPIRATION}

