spring:
  server:
    port: ${PORT:8082}
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:create}
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  port: ${PORT:8082}

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  RabbitMQ:
    uri: ${RABBITMQ_URI:}

app:
  base-url: http://localhost:${PORT:8081}
  mail:
    from: ${MAIL_FROM:${MAIL_USERNAME}}
  invitation:
    expiry-hours: 48      # hours

rabbit:
  exchange: ${RABBIT_EXCHANGE:orchestrate.exchange}
  queue: ${RABBIT_QUEUE:orchestrate.queue}
  routing-key: ${RABBIT_ROUTING_KEY:orchestrate.routingkey}

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api:
    key: ${CLOUDINARY_API_KEY}
    secret: ${CLOUDINARY_API_SECRET}

organization:
  plan-limits:
    FREE:
      max-members: 5
      max-projects: 3
    PRO:
      max-members: 25
      max-projects: 20
    ENTERPRISE:
      max-members: 200
      max-projects: 500
